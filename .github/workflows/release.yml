name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
          - os: macos-latest
            label: macOS
          - os: ubuntu-latest
            label: Linux

    runs-on: ${{ matrix.os }}
    name: Build — ${{ matrix.label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y rpm

      - name: Build and package
        run: npm run electron:make
        env:
          NODE_ENV: production

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: out/make/**/*
          body: |
            ## PlotWeave ${{ github.ref_name }}

            ### Download
            | Platform | File |
            |----------|------|
            | Windows  | `PlotWeave-*-Setup.exe` |
            | macOS    | `PlotWeave-*.zip` |
            | Linux    | `plotweave_*.deb` or `plotweave-*.rpm` |

            ### Install
            - **Windows**: Run the `.exe` installer
            - **macOS**: Unzip and drag PlotWeave to your Applications folder. On first run, right-click → Open if macOS warns about the developer.
            - **Linux**: Install the `.deb` with `sudo dpkg -i plotweave_*.deb` or the `.rpm` with `sudo rpm -i plotweave-*.rpm`

            > All data is stored locally on your machine. No account or internet connection required.
